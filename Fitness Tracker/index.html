<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="BMI calculator app" />
    <title>BMI Buddy</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src = "index.js"></script>
  </head>
  <body>
    <header class="container">
      <nav>
        <ul>
          <li><a href="index.html">BMI Buddy</a></li>
          <li><a href="calorie-cal.html">Calorie Compass</a></li>
          <li><a href="water-watch.html">Water Watcher</a></li>
          <li><a href="step-sankhya.html">Step Sankhya</a></li>
        </ul>
      </nav>
      <hgroup>
        <h1>BMI Buddy</h1>
        <p>calculate your BMI</p>
      </hgroup>
    </header>
    <main class="container">
      <section>
        <p>Set your weight, height and gender to see your BMI</p>
        <div>
          <input
            type="number"
            placeholder="Weight in kgs"
            id="weight"
            required
          />

          <input
            type="number"
            placeholder="Height in cms"
            id="height"
            required
          />

          <select id="gender">
            <option value="female">Female</option>
            <option value="male">Male</option>
          </select>

          <button id="calculateBtn" type="button">Check My BMI</button>
        </div>
      </section>
      <section>
        <p id="result"></p>
      </section>
    </main>
    <footer class="container neog-footer">
      <small>
        go from zero to hero at full stack development with
        <a href="https://neog.camp">neog.camp</a>
      </small>
    </footer>
  </body>
</html>
