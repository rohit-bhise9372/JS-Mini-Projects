<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Discount Deducer</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="container">
      <nav>
        <ul>
          <li><a href="index.html">Paise Planner </a></li>
          <li><a href="converter.html">Kurrency Konverter</a></li>
          <li><a href="discount-cal.html">Discount Deducer</a></li>
          <li><a href="bill-splitter.html">Bill Batwara</a></li>
        </ul>
      </nav>
      <hgroup>
        <h1>Discount Deducer</h1>
        <p>let's see how much you saved</p>
      </hgroup>
    </header>
    <main class="container">
      <section>
        <div class="grid">
          <input
            placeholder="Enter total amount"
            type="number"
            id="inputAmount"
          />

          <input
            placeholder="Enter discount percentage"
            type="number"
            id="inputDiscount"
          />

          <button id="calculateBtn">Calculate Discount</button>
        </div>
      </section>
      <section>
        <p id="result"></p>
      </section>
    </main>
    <footer class="container neog-footer">
      <small>
        go from zero to hero at full stack development with
        <a href="https://neog.camp">neog.camp</a>
      </small>
    </footer>

    <script>
      const calculateBtn = document.getElementById("calculateBtn");

      function calculateFinalDiscount(total, discountPercentage) {
        const savedAmount = (total * discountPercentage) / 100;
        const finalPrice = total - savedAmount;
        return {
          savedAmount: savedAmount.toFixed(2),
          finalPrice: finalPrice.toFixed(2),
        };
      }
      function processDiscount() {
        const totalInputAmount = document.getElementById("inputAmount");
        const totaldiscountAmount = document.getElementById("inputDiscount");
        const resultElement = document.getElementById("result");

        const total = Number(totalInputAmount.value);
        const discountPercentage = Number(totaldiscountAmount.value);

        const requiredDiscount = calculateFinalDiscount(
          total,
          discountPercentage
        );

        resultElement.innerText =
          "You saved " +
          "\u20B9" +
          requiredDiscount.savedAmount +
          "." +
          " Final price is " +
          "\u20B9" +
          requiredDiscount.finalPrice +
          ".";
      }

      calculateBtn.addEventListener("click", processDiscount);
    </script>
  </body>
</html>
