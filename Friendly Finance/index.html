<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>₹Paise Planner</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src = "index.js"> </script>
  </head>
  <body>
    <header class="container">
      <nav>
        <ul>
          <li><a href="index.html">Paise Planner </a></li>
          <li><a href="converter.html">Kurrency Konverter</a></li>
          <li><a href="discount-cal.html">Discount Deducer</a></li>
          <li><a href="bill-splitter.html">Bill Batwara</a></li>
        </ul>
      </nav>
      <hgroup>
        <h1>₹Paise Planner</h1>
        <p>plan your savings better</p>
      </hgroup>
    </header>
    <main class="container">
      <section>
        <p>
          Set your total goal, timeline and current savings to see how much you
          need to save each month.
        </p>
        <div>
          <input
            placeholder="Total goal amount"
            type="number"
            id="total"
            required
          />

          <input
            placeholder="Number of months"
            type="number"
            id="months"
            required
          />

          <input
            placeholder="Currently saved"
            type="number"
            id="current"
            required
          />

          <button id="calculateBtn" type="button">
            How much do I need to save per month?
          </button>
        </div>
      </section>

      <section>
        <p id="result"></p>
      </section>
    </main>
    <footer class="container neog-footer">
      <small>
        go from zero to hero at full stack development with
        <a href="https://neog.camp">neog.camp</a>
      </small>
    </footer>

    
  </body>
</html>
