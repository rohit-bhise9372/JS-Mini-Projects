<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Calculate fuel cost expense based on distance and fuel price."
    />
    <title>Fuel Cost Calculator</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src = "fuel-cal.js"> </script>
  </head>
  <body>
    <header class="container">
      <nav>
        <ul>
          <li><a href="index.html">TripWise Tools</a></li>
        </ul>
        <ul>
          <li><a href="avg-cal.html">Average Speed</a></li>
          <li><a href="eta.html">ETA</a></li>
          <li><a href="fuel-cal.html">Fuel Cost</a></li>
          <li><a href="itinerary-cal.html"> Itinerary Cost</a></li>
        </ul>
      </nav>
      <hr />
      <hgroup>
        <h1>Fuel Cost Calculator</h1>
      </hgroup>
    </header>
    <main class="container">
      <fieldset>
        Distance (km):
        <input type="number" id="distanceInput" />

        Fuel Efficiency (km/l):
        <input type="number" id="fuelEfficiencyInput" />

        Fuel Price (per litre):
        <input type="number" id="fuelPriceInput" />

        <input type="submit" id="calculateBtn" value="Calculate Cost" />
        <!-- <button type="button" id="calculateBtn">Calculate Cost</button> -->
      </fieldset>
      <div id="result"></div>
    </main>
    <footer class="container neog-footer">
      <small>

      </small>
